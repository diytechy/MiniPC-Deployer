# AWOW AK41 always-on core — the whole stack (host layout).
#
# Four services, all health-checked, all restart:unless-stopped so a reboot or a
# single crash self-heals with zero manual clicks (the WI-4.7 goal):
#   technitium  — split-horizon LAN DNS + recursion + blocklists + HTTP API
#   caddy       — reverse proxy + basic_auth + automatic TLS (valid on LAN via
#                 split-horizon)
#   tracker     — the NagLight web container (image naglight:local, WI-10.1/10.4)
#   actual      — Actual Budget (finances)
#
# Every knob is in .env (copy .env.example -> .env). No secret or site-specific
# value is baked into this file; it is safe to commit.
#
# Networking model:
#   - Technitium binds host :53 (udp+tcp) so it is the LAN's DNS server, and
#     :5380 for its HTTP API/console. Host network because a DNS server must see
#     real client IPs for per-client rules and must own :53.
#   - Caddy publishes :80/:443 to the host for the reverse proxy + ACME.
#   - tracker and actual stay on the internal bridge; only Caddy reaches them.
#
# Provisioning (Technitium zero-touch) is done by provision/provision-technitium.sh,
# invoked by the first-boot systemd unit AFTER `docker compose up -d` — not here,
# because it talks to Technitium's HTTP API once the container is healthy.

services:
  technitium:
    image: technitium/dns-server:${TECHNITIUM_IMAGE_TAG}
    container_name: technitium
    hostname: dns
    # Host network: a resolver needs :53 on the LAN and the real client source IP.
    network_mode: host
    environment:
      # Technitium reads this on FIRST start to set the initial admin password,
      # so the box comes up already password-protected (no default-creds window).
      # provision-technitium.sh is still idempotent if the box was pre-seeded.
      DNS_SERVER_ADMIN_PASSWORD: ${TECHNITIUM_ADMIN_PASSWORD}
      DNS_SERVER_DOMAIN: ${DNS_HOSTNAME}
      # Bind the web console to all interfaces on :5380 (LAN-reachable for the API).
      DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
    volumes:
      - technitium_config:/etc/dns
    restart: unless-stopped
    healthcheck:
      # The login page on :5380 is the cheapest liveness probe that needs no token.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5380/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:${CADDY_IMAGE_TAG}
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddyfile is templated with these (see Caddyfile `{$VAR}` refs).
      DOMAIN: ${DOMAIN}
      LAN_IP: ${LAN_IP}
      TRACKER_HOST: ${TRACKER_SUBDOMAIN}.${DOMAIN}
      ACTUAL_HOST: ${ACTUAL_SUBDOMAIN}.${DOMAIN}
      # basic_auth guards the SINGLE-USER services (Actual, dns console) only.
      # The tracker host is NOT basic_auth'd — oauth2-proxy owns its auth (D2).
      ACTUAL_BASICAUTH_USER: ${ACTUAL_BASICAUTH_USER}
      ACTUAL_BASICAUTH_HASH: ${ACTUAL_BASICAUTH_HASH}
      DNS_BASICAUTH_USER: ${DNS_BASICAUTH_USER}
      DNS_BASICAUTH_HASH: ${DNS_BASICAUTH_HASH}
      ACME_EMAIL: ${ACME_EMAIL}
      MAIN_BOX_IP: ${MAIN_BOX_IP}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # certs + ACME account — persist so re-issue isn't needed on reboot
      - caddy_config:/config
    depends_on:
      oauth2-proxy:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Caddy admin API on :2019 is always up when the process is; cheap liveness.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── oauth2-proxy — Google sign-in for the tracker subdomain (WI-10.2, D1/D2) ──
  # Stock upstream image; NO code repo of its own (D1). Caddy forwards the tracker
  # host here WITHOUT basic_auth; oauth2-proxy does the Google OAuth dance, then
  # reverse-proxies to the tracker container, injecting the verified identity
  # headers (X-Forwarded-Email / X-Forwarded-User) the tracker's trusted-header
  # multi-user mode consumes (D3, NagLight WI-10.5).
  #
  # PETER MANUAL STEP (see README + .env.example): create a Google Cloud OAuth
  # 2.0 client and register the redirect URI before this can start.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:${OAUTH2_PROXY_IMAGE_TAG}
    container_name: oauth2-proxy
    environment:
      # Provider + app credentials (from the Google Cloud OAuth client).
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      # 32-byte cookie encryption seed. Generate:
      #   openssl rand -base64 32 | tr -- '+/' '-_'
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      # Allow-list of Google accounts permitted through (Q10.5: explicit list to
      # start; a remote-settable console is a deferred FUTURE knob, not built).
      # The first-boot flow materializes this file from OAUTH2_PROXY_ALLOWED_EMAILS.
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/authenticated-emails.txt
      # Listen on all bridge interfaces so Caddy can reach it.
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      # The upstream oauth2-proxy protects and forwards to (the tracker container).
      OAUTH2_PROXY_UPSTREAMS: http://tracker:8787
      # Emit the identity headers to the upstream (D3 trusted-header mode).
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"       # X-Forwarded-User / -Email to upstream
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"        # X-Auth-Request-* headers too
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      # Public URL of the tracker (used to build the redirect + cookie domain).
      OAUTH2_PROXY_REDIRECT_URL: https://${TRACKER_SUBDOMAIN}.${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_COOKIE_DOMAINS: ${TRACKER_SUBDOMAIN}.${DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${TRACKER_SUBDOMAIN}.${DOMAIN}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      # Behind Caddy's TLS termination — trust the X-Forwarded-* Caddy sets.
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"              # gate on the allow-list file, not the domain
    volumes:
      # The allow-list file materialized from OAUTH2_PROXY_ALLOWED_EMAILS by the
      # first-boot flow (real accounts kept out of git; see .env.example + README).
      - ./oauth2-proxy/authenticated-emails.txt:/etc/oauth2-proxy/authenticated-emails.txt:ro
    depends_on:
      tracker:
        condition: service_healthy
    expose:
      - "4180"
    restart: unless-stopped
    healthcheck:
      # oauth2-proxy serves /ping unauthenticated for liveness.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4180/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  tracker:
    # NagLight is the canonical build now (its repo owns the Dockerfile, WI-10.4).
    # LOCAL BUILD STEP (Q10.2: build locally, no registry yet). From a sibling
    # NagLight checkout run:
    #     docker build -t naglight:local ../NagLight
    # then `docker compose up -d` here consumes that image.
    image: naglight:${TRACKER_IMAGE_TAG}
    # FALLBACK — let compose build the image from a sibling ../NagLight checkout
    # instead of a pre-built tag. Uncomment if you'd rather `compose build` it.
    # (The deprecated reference Dockerfile under ./tracker is kept only for
    # history; NagLight's own Dockerfile is the source of truth.)
    # build:
    #   context: ../../NagLight
    #   dockerfile: deploy/tracker/Dockerfile
    container_name: tracker
    environment:
      DATA_DIR: /data
      # If set, the entrypoint clones this remote into /data on first boot and
      # `git pull --rebase` on subsequent boots (the "clone of the data repo").
      # Leave blank to bind-mount a local data dir instead.
      TRACKER_DATA_REMOTE: ${TRACKER_DATA_REMOTE}
      TRACKER_GIT_NAME: ${TRACKER_GIT_NAME}
      TRACKER_GIT_EMAIL: ${TRACKER_GIT_EMAIL}
      # Passed to `tracker serve --commit` when true (nightly materialize commits).
      # Disabled for hosted multi-user mode (D3) — leave false when MULTI_USER=true.
      TRACKER_COMMIT: ${TRACKER_COMMIT}
      # Trusted-header multi-user opt-in (NagLight WI-10.5, D3). When true the
      # tracker takes identity from oauth2-proxy's X-Forwarded-Email header ONLY
      # and keys a per-user data dir off the Google `sub` claim.
      TRACKER_MULTI_USER: ${TRACKER_MULTI_USER}
    volumes:
      - tracker_data:/data
    # expose (bridge-only), NOT ports: the tracker must never be reachable except
    # via oauth2-proxy (D2/WI-10.5 — trusted headers are forgeable if the port is
    # open). No host publish.
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      # /api/today is the JSON health surface; a 200 means the engine loaded the
      # definitions and can score the day.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8787/api/today || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  actual:
    image: actualbudget/actual-server:${ACTUAL_IMAGE_TAG}
    container_name: actual
    environment:
      ACTUAL_PORT: "5006"
    volumes:
      - actual_data:/data
    expose:
      - "5006"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5006/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  technitium_config:
  caddy_data:
  caddy_config:
  tracker_data:
  actual_data:
