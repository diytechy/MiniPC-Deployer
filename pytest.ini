[pytest]
# Test discovery + the tier markers the check harness selects with --tier.
# An UNMARKED test runs in the `full` and `release` tiers — the safe default, so
# forgetting a marker can't silently drop a test from the pre-merge suite.
# Mark @pytest.mark.smoke on fast critical paths (also run every iteration);
# mark @pytest.mark.release on slow/hardware tests (kept out of pre-merge).
# --strict-markers turns a typo'd marker into an error instead of a silent skip.
testpaths = tests
addopts = --strict-markers
markers =
    smoke: fast, critical-path checks; also run every iteration / on every push
    full: optional label for the pre-merge suite (unmarked tests run there anyway)
    release: slow / hardware / long-running / manual-adjacent; run only at G-Release
