# AWOW AK41 always-on core — the whole stack (host layout).
#
# Four services, all health-checked, all restart:unless-stopped so a reboot or a
# single crash self-heals with zero manual clicks (the WI-4.7 goal):
#   technitium  — split-horizon LAN DNS + recursion + blocklists + HTTP API
#   caddy       — reverse proxy + basic_auth + automatic TLS (valid on LAN via
#                 split-horizon)
#   tracker     — the NagLight web container (image naglight:local, WI-10.1/10.4)
#   actual      — Actual Budget (finances)
#   ddns        — Cloudflare dynamic-DNS updater (apex + wildcard A records
#                 follow the home IP; AWOW owns DDNS per WI-9 Q4)
#
# Every knob is in .env (copy .env.example -> .env). No secret or site-specific
# value is baked into this file; it is safe to commit.
#
# Networking model:
#   - Technitium binds host :53 (udp+tcp) so it is the LAN's DNS server, and
#     :5380 for its HTTP API/console. Host network because a DNS server must see
#     real client IPs for per-client rules and must own :53.
#   - Caddy publishes :80/:443 to the host for the reverse proxy + ACME.
#   - tracker and actual stay on the internal bridge; only Caddy reaches them.
#
# Provisioning (Technitium zero-touch) is done by provision/provision-technitium.sh,
# invoked by the first-boot systemd unit AFTER `docker compose up -d` — not here,
# because it talks to Technitium's HTTP API once the container is healthy.

services:
  technitium:
    image: technitium/dns-server:${TECHNITIUM_IMAGE_TAG}
    container_name: technitium
    hostname: dns
    # Host network: a resolver needs :53 on the LAN and the real client source IP.
    network_mode: host
    environment:
      # Technitium reads this on FIRST start to set the initial admin password,
      # so the box comes up already password-protected (no default-creds window).
      # provision-technitium.sh is still idempotent if the box was pre-seeded.
      DNS_SERVER_ADMIN_PASSWORD: ${TECHNITIUM_ADMIN_PASSWORD}
      DNS_SERVER_DOMAIN: ${DNS_HOSTNAME}
      # Bind the web console to all interfaces on :5380 (LAN-reachable for the API).
      DNS_SERVER_WEB_SERVICE_HTTP_PORT: "5380"
    volumes:
      - technitium_config:/etc/dns
    restart: unless-stopped
    healthcheck:
      # The technitium/dns-server image ships bash but NO wget/curl (verified in
      # the AWOW-sim, WI-10.14), so probe the :5380 console port with bash's
      # /dev/tcp instead of wget — a tool-independent liveness check that only
      # succeeds once Technitium is listening.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5380"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  caddy:
    image: caddy:${CADDY_IMAGE_TAG}
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddyfile is templated with these (see Caddyfile `{$VAR}` refs).
      DOMAIN: ${DOMAIN}
      LAN_IP: ${LAN_IP}
      TRACKER_HOST: ${TRACKER_SUBDOMAIN}.${DOMAIN}
      ACTUAL_HOST: ${ACTUAL_SUBDOMAIN}.${DOMAIN}
      # basic_auth guards the SINGLE-USER services (Actual, dns console) only.
      # The tracker host is NOT basic_auth'd — oauth2-proxy owns its auth (D2).
      ACTUAL_BASICAUTH_USER: ${ACTUAL_BASICAUTH_USER}
      ACTUAL_BASICAUTH_HASH: ${ACTUAL_BASICAUTH_HASH}
      DNS_BASICAUTH_USER: ${DNS_BASICAUTH_USER}
      DNS_BASICAUTH_HASH: ${DNS_BASICAUTH_HASH}
      ACME_EMAIL: ${ACME_EMAIL}
      MAIN_BOX_IP: ${MAIN_BOX_IP}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # certs + ACME account — persist so re-issue isn't needed on reboot
      - caddy_config:/config
    extra_hosts:
      # host.docker.internal is a Docker DESKTOP name — plain docker-ce (what the
      # AWOW runs) does not provide it unless mapped to the host gateway here.
      # Without this the dns.<domain> site (reverse_proxy host.docker.internal:5380)
      # 502s on the real box. The AWOW-sim could not catch it: Caddyfile.sim
      # deliberately proxies the bridge container name instead (review 2026-07-10).
      - "host.docker.internal:host-gateway"
    depends_on:
      oauth2-proxy:
        # service_started (not _healthy): oauth2-proxy is distroless and carries
        # no container healthcheck (see its block). It waits for the tracker to be
        # healthy before starting, so start-order is still correct; Caddy tolerates
        # a brief 502 if it races ahead.
        condition: service_started
    restart: unless-stopped
    healthcheck:
      # Caddy admin API on :2019 is always up when the process is; cheap liveness.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── oauth2-proxy — Google sign-in for the tracker subdomain (WI-10.2, D1/D2) ──
  # Stock upstream image; NO code repo of its own (D1). Caddy forwards the tracker
  # host here WITHOUT basic_auth; oauth2-proxy does the Google OAuth dance, then
  # reverse-proxies to the tracker container, injecting the verified identity
  # headers (X-Forwarded-Email / X-Forwarded-User) the tracker's trusted-header
  # multi-user mode consumes (D3, NagLight WI-10.5).
  #
  # PETER MANUAL STEP (see README + .env.example): create a Google Cloud OAuth
  # 2.0 client and register the redirect URI before this can start.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:${OAUTH2_PROXY_IMAGE_TAG}
    container_name: oauth2-proxy
    environment:
      # Provider + app credentials (from the Google Cloud OAuth client).
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      # 32-byte cookie encryption seed. Generate:
      #   openssl rand -base64 32 | tr -- '+/' '-_'
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      # Allow-list of Google accounts permitted through (Q10.5: explicit list to
      # start; a remote-settable console is a deferred FUTURE knob, not built).
      # The first-boot flow materializes this file from OAUTH2_PROXY_ALLOWED_EMAILS.
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/authenticated-emails.txt
      # Listen on all bridge interfaces so Caddy can reach it.
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      # The upstream oauth2-proxy protects and forwards to (the tracker container).
      OAUTH2_PROXY_UPSTREAMS: http://tracker:8787
      # Emit the identity headers to the upstream (D3 trusted-header mode).
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"       # X-Forwarded-User / -Email to upstream
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"        # X-Auth-Request-* headers too
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      # Public URL of the tracker (used to build the redirect + cookie domain).
      OAUTH2_PROXY_REDIRECT_URL: https://${TRACKER_SUBDOMAIN}.${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_COOKIE_DOMAINS: ${TRACKER_SUBDOMAIN}.${DOMAIN}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${TRACKER_SUBDOMAIN}.${DOMAIN}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      # Behind Caddy's TLS termination — trust the X-Forwarded-* Caddy sets.
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"              # gate on the allow-list file, not the domain
    volumes:
      # The allow-list file materialized from OAUTH2_PROXY_ALLOWED_EMAILS by the
      # first-boot flow (real accounts kept out of git; see .env.example + README).
      - ./oauth2-proxy/authenticated-emails.txt:/etc/oauth2-proxy/authenticated-emails.txt:ro
    depends_on:
      tracker:
        condition: service_healthy
    expose:
      - "4180"
    restart: unless-stopped
    # NO container healthcheck: the stock oauth2-proxy image is distroless — it
    # ships no shell and no wget/curl, so a CMD/CMD-SHELL probe can never run
    # (verified in the AWOW-sim, WI-10.14). /ping DOES serve an unauthenticated
    # 200 for liveness; probe it from OUTSIDE the container (Caddy/Uptime-Kuma)
    # rather than via a container healthcheck. Caddy therefore waits only for this
    # service to START (below), and oauth2-proxy itself waits for the tracker to
    # be healthy before it starts, so ordering is still correct.

  tracker:
    # NagLight is the canonical build now (its repo owns the Dockerfile, WI-10.4).
    # LOCAL BUILD STEP (Q10.2: build locally, no registry yet). From a sibling
    # NagLight checkout run:
    #     docker build -t naglight:local ../NagLight
    # then `docker compose up -d` here consumes that image.
    image: naglight:${TRACKER_IMAGE_TAG}
    # FALLBACK — let compose build the image from a sibling ../NagLight checkout
    # instead of a pre-built tag. Uncomment if you'd rather `compose build` it.
    # (The deprecated reference Dockerfile under ./tracker is kept only for
    # history; NagLight's own Dockerfile is the source of truth.)
    # build:
    #   context: ../../NagLight
    #   dockerfile: deploy/tracker/Dockerfile
    container_name: tracker
    labels:
      # naglight:local has no registry home (Q10.2) — tell diun (tier-2 ops
      # profile, SR-012) not to look it up; every other image is watchable.
      - "diun.enable=false"
    environment:
      DATA_DIR: /data
      # If set, the entrypoint clones this remote into /data on first boot and
      # `git pull --rebase` on subsequent boots (the "clone of the data repo").
      # Leave blank to bind-mount a local data dir instead.
      TRACKER_DATA_REMOTE: ${TRACKER_DATA_REMOTE}
      TRACKER_GIT_NAME: ${TRACKER_GIT_NAME}
      TRACKER_GIT_EMAIL: ${TRACKER_GIT_EMAIL}
      # Passed to `tracker serve --commit` when true (nightly materialize commits).
      # Disabled for hosted multi-user mode (D3) — leave false when MULTI_USER=true.
      TRACKER_COMMIT: ${TRACKER_COMMIT}
      # Trusted-header multi-user opt-in (NagLight WI-10.5, D3). When true the
      # tracker takes identity from oauth2-proxy's X-Forwarded-Email header ONLY
      # and keys a per-user data dir off the Google `sub` claim.
      TRACKER_MULTI_USER: ${TRACKER_MULTI_USER}
    volumes:
      - tracker_data:/data
    # expose (bridge-only), NOT ports: the tracker must never be reachable except
    # via oauth2-proxy (D2/WI-10.5 — trusted headers are forgeable if the port is
    # open). No host publish.
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      # /healthz is the identity-free liveness surface in BOTH single- and
      # multi-user mode (matches the NagLight Dockerfile HEALTHCHECK). It must NOT
      # be /api/today: in multi-user mode (TRACKER_MULTI_USER=true, the D3 hosted
      # default) every /api/* route requires the oauth2-proxy X-Forwarded-User
      # header, so a header-less probe to /api/today returns 403 and the container
      # would never report healthy. Surfaced by the AWOW-sim (WI-10.14).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8787/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  actual:
    image: actualbudget/actual-server:${ACTUAL_IMAGE_TAG}
    container_name: actual
    environment:
      ACTUAL_PORT: "5006"
    volumes:
      - actual_data:/data
    expose:
      - "5006"
    restart: unless-stopped
    healthcheck:
      # The actual-server image ships bash but NO wget/curl (verified in the
      # AWOW-sim, WI-10.14) — probe :5006 with bash's /dev/tcp instead of wget.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5006"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── finance-auditor — the daily finance audit pipeline (IF-004 ↔ FA IF-003) ──
  # Consumes the Finance-Auditor image (private sibling repo; resolver SR-006:
  #   bash scripts/ensure-local-images.sh   builds it with the ACTUAL_API_VERSION
  # build-arg pinned to ACTUAL_IMAGE_TAG — the IF-002 coupling: REBUILD this image
  # whenever the Actual pin bumps). Merged from FA's reference spec
  # (deploy/compose.service.example.yml, DEC-19).
  #
  # PROFILE-GATED until Finance-Auditor passes its G-Release (live TC-033) and
  # G-Final (7-day AWOW run) — then promote to core + the baked payload (SR-014).
  # No ports and no healthcheck ON PURPOSE (scheduled daemon, no listening
  # surface; "did today's status post" is the liveness signal and the tracker's
  # automated-lane aging is the backstop — see FA's Dockerfile).
  # PRIVACY (FA §3 firewall): raw finance data lives ONLY in the two volumes
  # below; never bake secrets/snapshots into the image; snapshots must NEVER
  # join OFFSITE_SETS (IceDrive is cloud) — LAN backup drive only.
  finance-auditor:
    image: finance-auditor:${FINANCE_AUDITOR_IMAGE_TAG}
    container_name: finance-auditor
    profiles: ["finance-auditor"]
    environment:
      TZ: ${TIMEZONE}                  # RUN_AT is read as BOX-LOCAL time (FA SR-001)
      RUN_AT: ${FINANCE_RUN_AT}
      # Actual over the compose-internal bridge ONLY (FA IF-002/SR-003) — never
      # the public actual.<domain> route.
      ACTUAL_URL: http://actual:5006
      ACTUAL_SYNC_ID: ${FINANCE_ACTUAL_SYNC_ID}
      ACTUAL_PASSWORD: ${FINANCE_ACTUAL_PASSWORD}
      # Tracker feed (FA IF-001) — bridge-internal, bearer-token'd. NOTE: in
      # multi-user tracker mode (D3) direct /api/* posts also need an
      # X-Forwarded-User header, which FA's feed client does not send yet —
      # fine single-user; recorded as an FA gap for multi-user boxes.
      TRACKER_FEED_URL: http://tracker:8787/api/feed
      TRACKER_FEED_TOKEN: ${FINANCE_TRACKER_FEED_TOKEN}
    volumes:
      - finance_snapshots:/snapshots          # LAN-only audit artifacts (FA SR-005/006)
      - finance_actual_data:/data/actual      # @actual-app/api cache — persist across restarts
    depends_on:
      actual:
        condition: service_healthy
      tracker:
        condition: service_healthy
    restart: unless-stopped

  # ── ddns — keep the public A records pointed at the home connection ──────────
  # Gap Peter caught 2026-07-04: DDNS previously ran on Mini-serv as the legacy
  # DDNS-Cloudflare-PowerShell scripts; per WI-9 Q4 the AWOW owns it now, and the
  # stack had no updater at all. Without this, a home-IP change strands the whole
  # external path (Caddy/ACME included).
  # Updates the apex AND the wildcard record so every subdomain follows along.
  # Healthcheck: inherited from the image (distroless; it ships its own
  # HEALTHCHECK binary — do not add a CMD-SHELL probe, there is no shell).
  # Web UI is deliberately NOT published; logs via `docker logs ddns` / Dozzle.
  ddns:
    image: qmcgaw/ddns-updater:${DDNS_IMAGE_TAG}
    container_name: ddns
    environment:
      PERIOD: ${DDNS_PERIOD}
      UPDATE_COOLDOWN_PERIOD: 5m
      PUBLICIP_FETCHERS: all
      LISTENING_ADDRESS: ":8000"
      CONFIG: >-
        {"settings":[
        {"provider":"cloudflare","zone_identifier":"${CLOUDFLARE_ZONE_ID}","domain":"${DOMAIN}","ttl":300,"token":"${CLOUDFLARE_API_TOKEN}","ip_version":"ipv4"},
        {"provider":"cloudflare","zone_identifier":"${CLOUDFLARE_ZONE_ID}","domain":"*.${DOMAIN}","ttl":300,"token":"${CLOUDFLARE_API_TOKEN}","ip_version":"ipv4"}
        ]}
    volumes:
      - ddns_data:/updater/data
    restart: unless-stopped

  # ── Auxiliary LAN-only observability (WI-10.11) ───────────────────────────────
  # These management UIs are published bound to the box's LAN_IP only (not to
  # 0.0.0.0), so they are reachable on the LAN but NOT proxied to the public
  # internet and NOT forwarded by the router. Do NOT add Caddy sites for them.

  # Uptime-Kuma — generic up-checks (can also POST to NagLight /api/feed).
  uptime-kuma:
    image: louislam/uptime-kuma:${UPTIMEKUMA_IMAGE_TAG}
    container_name: uptime-kuma
    volumes:
      - uptimekuma_data:/app/data
    ports:
      - "${LAN_IP}:${UPTIMEKUMA_PORT}:3001"   # LAN-only: bound to the box's LAN IP
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Dozzle — live container log viewer (reads the docker socket read-only).
  dozzle:
    image: amir20/dozzle:${DOZZLE_IMAGE_TAG}
    container_name: dozzle
    environment:
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${LAN_IP}:${DOZZLE_PORT}:8080"       # LAN-only: bound to the box's LAN IP
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ntfy — OPTIONAL self-hosted push notifications (currently external). Opt-in:
  # starts only with `docker compose --profile ntfy up -d`. LAN-only like the rest.
  ntfy:
    image: binwiederhier/ntfy:${NTFY_IMAGE_TAG}
    container_name: ntfy
    profiles: ["ntfy"]
    command: serve
    environment:
      NTFY_BASE_URL: http://${LAN_IP}:${NTFY_PORT}
      NTFY_LISTEN_HTTP: ":80"
      NTFY_BEHIND_PROXY: "false"
    volumes:
      - ntfy_data:/var/lib/ntfy
      - ntfy_cache:/var/cache/ntfy
    ports:
      - "${LAN_IP}:${NTFY_PORT}:80"           # LAN-only: bound to the box's LAN IP
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER-2 OPT-IN CATALOG (SR-012, review 2026-07-10) — everything below is OFF
  # by default. Each service sits behind a compose profile (the ntfy pattern):
  # nothing here starts, is health-gated, or is baked into the ISO payload unless
  # its profile is enabled (COMPOSE_PROFILES in .env, or `--profile NAME up -d`).
  #
  # Ground rules for this tier:
  #   - LAN-only UIs bind ${LAN_IP} (the WI-10.11 pattern); public exposure is a
  #     deliberate second step: uncomment the matching Caddyfile site AND add the
  #     label to EXTRA_SUBDOMAINS in .env (split-horizon record).
  #   - Image pins are best-effort as of 2026-07 authoring and are NOT part of
  #     the sim-validated set — VERIFY the tag at enable time; the diun profile
  #     watches them afterwards.
  #   - NO custom healthchecks yet: which probe tooling each image ships is
  #     unverified (the WI-10.14 lesson — check empirically at enable time);
  #     image-inherited HEALTHCHECKs still apply.
  #   - Media libraries live under ${MEDIA_ROOT} on the HOST — bind mounts, not
  #     named volumes, so libraries can sit on real storage. NOTE the tension:
  #     serving media from the WI-10.10 backup drives would defeat their
  #     spin-down policy; media wants its own always-on disk or a LAN share.
  #   - RAM budget (8 GB box): the core uses ~1.5 GB. HA + Jellyfin + the small
  #     services fit comfortably. Run AT MOST ONE photo stack; Immich's ML
  #     container is a separate profile (immich-ml) — leave it off on the J4125.
  #   - Tier-2 volumes are NOT yet covered by the backup service (open review
  #     finding — stack volumes generally aren't; see docs/status.md).

  # ── photos, option A: Immich (Google-Photos-style; mobile auto-backup) ───────
  # Enable: profile `immich` (server+db+redis). Semantic search/face ML is the
  # separate `immich-ml` profile — heavy; leave off on the J4125 or cap memory.
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_IMAGE_TAG}
    container_name: immich-server
    profiles: ["immich"]
    environment:
      TZ: ${TIMEZONE}
      DB_HOSTNAME: immich-db
      DB_USERNAME: ${IMMICH_DB_USERNAME}
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: ${IMMICH_DB_DATABASE}
      REDIS_HOSTNAME: immich-redis
      # false unless the immich-ml profile is also enabled.
      IMMICH_MACHINE_LEARNING_ENABLED: ${IMMICH_ML_ENABLED}
    volumes:
      - ${MEDIA_ROOT}/immich:/data
    ports:
      - "${LAN_IP}:${IMMICH_PORT}:2283"   # LAN UI/API; public = Caddyfile photos.* site
    depends_on:
      - immich-redis
      - immich-db
    restart: unless-stopped

  # Name matches immich-server's built-in default ML URL (http://immich-machine-learning:3003).
  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_IMAGE_TAG}
    container_name: immich-machine-learning
    profiles: ["immich-ml"]
    volumes:
      - immich_model_cache:/cache
    restart: unless-stopped

  immich-redis:
    image: valkey/valkey:${IMMICH_REDIS_IMAGE_TAG}
    container_name: immich-redis
    profiles: ["immich"]
    restart: unless-stopped

  immich-db:
    # Immich's own curated Postgres image (vectorchord) — tag must track the
    # IMMICH_IMAGE_TAG line's release notes on bumps.
    image: ghcr.io/immich-app/postgres:${IMMICH_DB_IMAGE_TAG}
    container_name: immich-db
    profiles: ["immich"]
    environment:
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_DB: ${IMMICH_DB_DATABASE}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - immich_db:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped

  # ── photos, option B: PhotoPrism (indexes-in-place; lighter; single-user free) ─
  # Point it at an existing library: it indexes ${MEDIA_ROOT}/photos where it
  # lives (no import). Pair with the syncthing profile for phone→box transfer.
  photoprism:
    image: photoprism/photoprism:${PHOTOPRISM_IMAGE_TAG}
    container_name: photoprism
    profiles: ["photoprism"]
    environment:
      PHOTOPRISM_ADMIN_PASSWORD: ${PHOTOPRISM_ADMIN_PASSWORD}
      PHOTOPRISM_SITE_URL: http://${LAN_IP}:${PHOTOPRISM_PORT}/
      PHOTOPRISM_DATABASE_DRIVER: mysql
      PHOTOPRISM_DATABASE_SERVER: photoprism-db:3306
      PHOTOPRISM_DATABASE_NAME: photoprism
      PHOTOPRISM_DATABASE_USER: photoprism
      PHOTOPRISM_DATABASE_PASSWORD: ${PHOTOPRISM_DB_PASSWORD}
    volumes:
      - ${MEDIA_ROOT}/photos:/photoprism/originals
      - photoprism_storage:/photoprism/storage
    ports:
      - "${LAN_IP}:${PHOTOPRISM_PORT}:2342"
    depends_on:
      - photoprism-db
    restart: unless-stopped

  photoprism-db:
    image: mariadb:${PHOTOPRISM_DB_IMAGE_TAG}
    container_name: photoprism-db
    profiles: ["photoprism"]
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: photoprism
      MARIADB_USER: photoprism
      MARIADB_PASSWORD: ${PHOTOPRISM_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${PHOTOPRISM_DB_PASSWORD}
    volumes:
      - photoprism_db:/var/lib/mysql
    restart: unless-stopped

  # ── video: Jellyfin (movies/TV; music too if you skip Navidrome) ──────────────
  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_IMAGE_TAG}
    container_name: jellyfin
    profiles: ["jellyfin"]
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${MEDIA_ROOT}:/media:ro
    # J4125 Quick Sync (VA-API) — good for 1080p transcodes. REQUIRES /dev/dri on
    # the host; container creation FAILS without it (e.g. a Hyper-V test VM) —
    # comment the devices: block out there. Prefer direct-play; this is no 4K box.
    devices:
      - /dev/dri:/dev/dri
    ports:
      - "${LAN_IP}:${JELLYFIN_PORT}:8096"
    restart: unless-stopped

  # ── music: Navidrome (Subsonic API — pick any client app) ────────────────────
  navidrome:
    image: deluan/navidrome:${NAVIDROME_IMAGE_TAG}
    container_name: navidrome
    profiles: ["navidrome"]
    environment:
      ND_MUSICFOLDER: /music
    volumes:
      - navidrome_data:/data
      - ${MEDIA_ROOT}/music:/music:ro
    ports:
      - "${LAN_IP}:${NAVIDROME_PORT}:4533"
    restart: unless-stopped

  # ── podcasts + audiobooks: Audiobookshelf (subscribe/auto-download/track) ─────
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:${AUDIOBOOKSHELF_IMAGE_TAG}
    container_name: audiobookshelf
    profiles: ["audiobookshelf"]
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - audiobookshelf_config:/config
      - audiobookshelf_metadata:/metadata
      - ${MEDIA_ROOT}/audiobooks:/audiobooks
      - ${MEDIA_ROOT}/podcasts:/podcasts
    ports:
      - "${LAN_IP}:${AUDIOBOOKSHELF_PORT}:80"
    restart: unless-stopped

  # ── passwords: Vaultwarden (Bitwarden-compatible server) ─────────────────────
  # Deliberately NO LAN port: the Bitwarden clients refuse plain HTTP, so the
  # ONLY sane ingress is the Caddyfile vault.* site (TLS). Enabling this profile
  # without uncommenting that site gives you a container nothing can reach.
  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_IMAGE_TAG}
    container_name: vaultwarden
    profiles: ["vaultwarden"]
    environment:
      DOMAIN: https://vault.${DOMAIN}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED}
      # ADMIN_TOKEN deliberately unset — the /admin panel stays disabled. Set it
      # (argon2 hash, see vaultwarden wiki) only while you actively need it.
    volumes:
      - vaultwarden_data:/data
    expose:
      - "80"
    restart: unless-stopped

  # ── home automation: Home Assistant (container flavor) + Mosquitto (MQTT) ────
  # Container flavor = NO supervisor/add-on store (that path is deprecated
  # upstream anyway); companions run as sibling containers like mosquitto below.
  # Host network (like technitium): HA's device discovery needs mDNS/SSDP
  # broadcasts, so it binds :8123 on all interfaces — HA's own login is the gate.
  # Public exposure later = Caddyfile home.* site + trusted_proxies in HA's config.
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:${HOMEASSISTANT_IMAGE_TAG}
    container_name: homeassistant
    profiles: ["homeassistant"]
    network_mode: host
    environment:
      TZ: ${TIMEZONE}
    volumes:
      - homeassistant_config:/config
    restart: unless-stopped

  # Zigbee2MQTT is the natural third leg once a coordinator stick exists — not
  # defined here (hardware-dependent; add it when the stick is real).
  mosquitto:
    image: eclipse-mosquitto:${MOSQUITTO_IMAGE_TAG}
    container_name: mosquitto
    profiles: ["mosquitto"]
    volumes:
      # Config is committed (no secrets). Mosquitto 2.x listens localhost-only
      # without an explicit listener line — the file is required, not optional.
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    ports:
      - "${LAN_IP}:${MOSQUITTO_PORT}:1883"
    restart: unless-stopped

  # ── files: Syncthing (p2p sync — feeds ${MEDIA_ROOT} from phones/PCs) ─────────
  syncthing:
    image: syncthing/syncthing:${SYNCTHING_IMAGE_TAG}
    container_name: syncthing
    profiles: ["syncthing"]
    volumes:
      - syncthing_data:/var/syncthing
      - ${MEDIA_ROOT}:/media
    ports:
      - "${LAN_IP}:${SYNCTHING_GUI_PORT}:8384"     # web UI (set a GUI password!)
      - "${LAN_IP}:22000:22000/tcp"                # sync protocol
      - "${LAN_IP}:22000:22000/udp"
      - "${LAN_IP}:21027:21027/udp"                # local discovery
    restart: unless-stopped

  # ── quality-of-life: RSS, recipes, LAN dashboard ─────────────────────────────
  freshrss:
    image: freshrss/freshrss:${FRESHRSS_IMAGE_TAG}
    container_name: freshrss
    profiles: ["freshrss"]
    environment:
      TZ: ${TIMEZONE}
      CRON_MIN: "13,43"     # built-in feed refresh (twice hourly)
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
    ports:
      - "${LAN_IP}:${FRESHRSS_PORT}:80"
    restart: unless-stopped

  mealie:
    image: ghcr.io/mealie-recipes/mealie:${MEALIE_IMAGE_TAG}
    container_name: mealie
    profiles: ["mealie"]
    environment:
      TZ: ${TIMEZONE}
      BASE_URL: http://${LAN_IP}:${MEALIE_PORT}
      ALLOW_SIGNUP: "false"
    volumes:
      - mealie_data:/app/data
    ports:
      - "${LAN_IP}:${MEALIE_PORT}:9000"
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:${HOMEPAGE_IMAGE_TAG}
    container_name: homepage
    profiles: ["homepage"]
    environment:
      # Required since v0.9.2 — requests with any other Host are rejected.
      HOMEPAGE_ALLOWED_HOSTS: ${LAN_IP}:${HOMEPAGE_PORT}
    volumes:
      # Config lives in the volume (YAML, edited in place); no docker.sock on
      # purpose — the discovery widgets aren't worth socket access here.
      - homepage_config:/app/config
    ports:
      - "${LAN_IP}:${HOMEPAGE_PORT}:3000"
    restart: unless-stopped

  # ── ops: diun — pinned-image update NOTIFIER (closes the stale-pin gap) ───────
  # The Q10.9 B+ flip side: pins never drift, but security patches never arrive
  # unless someone looks (the oauth2-proxy v7.6.0 lesson, review 2026-07-10).
  # diun watches every running container's registry tag and NOTIFIES (never
  # auto-updates — Watchtower would violate the pin philosophy). Pair with the
  # ntfy profile: notifications land on your own push channel.
  diun:
    image: crazymax/diun:${DIUN_IMAGE_TAG}
    container_name: diun
    profiles: ["diun"]
    environment:
      TZ: ${TIMEZONE}
      DIUN_WATCH_SCHEDULE: "0 6 * * *"             # daily 06:00 check
      DIUN_PROVIDERS_DOCKER: "true"
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: "true" # all containers unless diun.enable=false
      DIUN_NOTIF_NTFY_ENDPOINT: ${DIUN_NTFY_ENDPOINT}
      DIUN_NOTIF_NTFY_TOPIC: ${DIUN_NTFY_TOPIC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - diun_data:/data
    restart: unless-stopped

volumes:
  ddns_data:
  technitium_config:
  caddy_data:
  caddy_config:
  tracker_data:
  actual_data:
  uptimekuma_data:
  ntfy_data:
  ntfy_cache:
  # finance-auditor (IF-004): snapshots are LAN-only PRIVATE finance data —
  # back up via volume: source, NEVER offsite; the api cache is re-creatable.
  finance_snapshots:
  finance_actual_data:
  # tier-2 opt-in volumes (SR-012) — created only when a profile first starts.
  immich_db:
  immich_model_cache:
  photoprism_storage:
  photoprism_db:
  jellyfin_config:
  jellyfin_cache:
  navidrome_data:
  audiobookshelf_config:
  audiobookshelf_metadata:
  vaultwarden_data:
  homeassistant_config:
  mosquitto_data:
  syncthing_data:
  freshrss_data:
  mealie_data:
  homepage_config:
  diun_data:
