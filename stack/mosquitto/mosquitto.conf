# Mosquitto broker config for the opt-in home-automation tier (SR-012).
# COMMITTED (no secrets): mosquitto 2.x listens localhost-only with no config,
# so an explicit listener line is required for the LAN bind in compose to work.
#
# Anonymous is acceptable to START (the port is bound to LAN_IP only), but lock
# it down before anything sensitive rides the bus:
#   mosquitto_passwd -c /mosquitto/data/passwd <user>
# then set `password_file /mosquitto/data/passwd` and `allow_anonymous false`.
listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
