# Reference CI workflow for the trajectory kit (GitHub Actions).
#
# Copies to .github/workflows/check.yml. It runs the SAME harness you run
# locally (`scripts/check.py`) so a green CI means exactly what a green local
# run means — no second, drifting definition of "passing". Swap the Python
# setup + install step for your stack; keep the single `check.py` invocation so
# the gate definition stays in one place.
name: check
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    # Add more entries to run the matrix on the platforms you support.
    strategy:
      matrix:
        os: [ubuntu-latest]   # e.g. [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Edit to your real dependencies. The reference harness uses ruff + pytest
      # (+ pytest-cov); trace.py and gen_arch_map.py are stdlib-only.
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          # Then install YOUR project's deps — pick the one that fits and let it
          # fail loudly (don't add `|| true`, which would hide an install error):
          #   pip install -e .                 # if you have a pyproject.toml
          #   pip install -r requirements.txt  # if you pin deps in a file

      # Tier by trigger: cheap smoke on every push, the full suite on PRs, and
      # the full release tier on a version tag. The GATE comes from the repo's
      # committed `docs/gate` file (check.py reads it), so CI enforces the bar
      # the project is actually at — a freshly-scaffolded G1 repo is green, and
      # the bar rises when a human bumps docs/gate in a reviewed commit. A
      # release tag claims the full bar explicitly. In CI we do NOT pass
      # --lenient: a missing required tool must fail, so checks can't be
      # silently skipped.
      - name: Smoke (push)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: python scripts/check.py --tier smoke

      - name: Full suite (pull request)
        if: github.event_name == 'pull_request'
        run: python scripts/check.py --tier full

      - name: Release suite (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python scripts/check.py --gate all --tier release
          python scripts/gen_release_checklist.py --version "${GITHUB_REF_NAME}"

      # Publish the generated reports even on failure, for review.
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.os }}
          path: |
            docs/test/report.md
            docs/test/report.html
            docs/test/perf-report.md
            docs/release-checklist.md
            docs/releases/
          if-no-files-found: ignore
